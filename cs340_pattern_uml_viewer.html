const catsEl=document.getElementById('cats');
const board=document.getElementById('board');
const info=document.getElementById('info');

const groups=[...new Set(P.map(p=>p.cat))];
groups.forEach(g=>{
  const lbl=document.createElement('span');
  lbl.className='cat-label';
  lbl.textContent=g;
  catsEl.appendChild(lbl);
  P.forEach((p,i)=>{
    if(p.cat!==g)return;
    const b=document.createElement('button');
    b.className='tab';
    b.textContent=p.name;
    b.dataset.i=i;
    b.onclick=()=>show(i);
    catsEl.appendChild(b);
  });
});

function show(i){
  const p=P[i];
  board.innerHTML=p.svg;
  info.innerHTML=`${p.desc}<span class="uses">Common uses: ${p.uses}</span>`;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',+b.dataset.i===i));
}
show(0);
</script>
